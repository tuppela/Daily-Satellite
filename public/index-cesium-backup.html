<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbital Register</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Instrument+Serif:ital@0;1&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Source+Code+Pro:wght@300;400;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet" />

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.0.0/satellite.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0ebe0;
      --ink: #1a1610;
      --ink-mid: rgba(26,22,16,0.35);
      --ink-faint: rgba(26,22,16,0.12);
      --ink-ghost: rgba(26,22,16,0.06);
      --parchment: #ede6d6;
      --serif: 'IM Fell English', Georgia, serif;
      --serif-sc: 'IM Fell English SC', Georgia, serif;
      --mono: 'Courier Prime', 'Courier New', monospace;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: var(--serif);
      color: var(--ink);
    }

    /* Cesium container */
    #cesium-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
    }

    /* Force cesium canvas to fill container */
    #cesium-container canvas {
      width: 100% !important;
      height: 100% !important;
      position: absolute;
      top: 0;
      left: 0;
    }

    .cesium-viewer,
    .cesium-viewer-cesiumWidgetContainer,
    .cesium-widget,
    .cesium-widget canvas {
      width: 100% !important;
      height: 100% !important;
    }

    /* Hide ALL Cesium UI chrome */
    .cesium-widget-credits,
    .cesium-viewer-toolbar,
    .cesium-viewer-animationContainer,
    .cesium-viewer-timelineContainer,
    .cesium-viewer-bottom,
    .cesium-viewer-fullscreenContainer,
    .cesium-viewer-geocoderContainer,
    .cesium-viewer-navigationHelpButtonContainer,
    .cesium-viewer-infoBoxContainer,
    .cesium-viewer-selectionIndicatorContainer,
    .cesium-navigationInstructionInitial,
    .cesium-credit-logoContainer,
    .cesium-credit-textContainer {
      display: none !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }

    /* Grain overlay for warmth */
    #grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      opacity: 0.028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
    }

    /* Header — masthead */
    #masthead {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      padding: 14px 32px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      border-bottom: 1px solid var(--ink-faint);
      background: linear-gradient(to bottom, var(--bg) 70%, transparent);
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    #masthead.visible { opacity: 1; }

    #masthead-left {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    #masthead-vol {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0.35;
    }

    #masthead-title {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 22px;
      letter-spacing: 0.01em;
      opacity: 0.9;
      text-align: center;
      justify-self: center;
    }

    #masthead-right {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.35;
      text-align: right;
      line-height: 1.7;
      pointer-events: none;
    }

    /* Daily Satellite card */
    #daily-card {
      position: fixed;
      bottom: 52px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      z-index: 60;
      width: 280px;
      border: 1px solid var(--ink);
      background: var(--bg);
      padding: 20px 24px 18px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.8s ease, transform 0.8s ease, box-shadow 0.3s ease;
    }
    #daily-card.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #daily-card:hover {
      box-shadow: 3px 3px 0 var(--ink);
    }

    #daily-card-issue {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      opacity: 0.4;
      margin-bottom: 8px;
    }

    #daily-card-name {
      font-family: var(--serif-sc);
      font-size: 19px;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    #daily-card-desc {
      font-family: var(--serif);
      font-style: italic;
      font-size: 12px;
      opacity: 0.6;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    #daily-card-cta {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0.5;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #daily-card-cta::after {
      content: '→';
      font-family: var(--serif);
      font-size: 14px;
      opacity: 0.7;
    }

    /* Hover tooltip for satellites */
    #sat-tooltip {
      position: fixed;
      z-index: 70;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      transform: translateX(-50%);
    }
    #sat-tooltip.visible { opacity: 1; }
    #sat-tooltip-name {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink);
      white-space: nowrap;
      background: var(--bg);
      padding: 3px 8px;
      border: 1px solid var(--ink-mid);
    }

    /* Season indicator */
    #season-indicator {
      position: fixed;
      bottom: 24px;
      right: 32px;
      z-index: 50;
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0;
      color: var(--ink);
      transition: opacity 1s ease;
      text-align: right;
      line-height: 1.8;
    }
    #season-indicator.visible { opacity: 0.3; }

    /* Sat count */
    #sat-count {
      position: fixed;
      bottom: 24px;
      left: 32px;
      z-index: 50;
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.25em;
      opacity: 0;
      color: var(--ink);
      transition: opacity 1s ease;
    }
    #sat-count.visible { opacity: 0.3; }

    /* ─── INFO PANEL ──────────────────────────────────────────────────────── */
    :root {
      --sc: 'Source Code Pro', 'Courier New', monospace;
      --panel-bg: rgb(238, 233, 221);
      --panel-border: rgba(26, 22, 16, 0.14);
      --panel-ink: rgba(26, 22, 16, 0.88);
      --panel-faint: rgba(26, 22, 16, 0.38);
      --panel-ghost: rgba(26, 22, 16, 0.09);
    }

    #info-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.96);
      z-index: 80;
      width: min(820px, 92vw);
      height: min(700px, 88vh);
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    #info-panel.visible {
      opacity: 1;
      pointer-events: all;
      transform: translate(-50%, -50%) scale(1);
    }

    /* ── Header bar — no border, tight ── */
    #panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 44px 16px;
      flex-shrink: 0;
    }

    #panel-sat-type {
      font-family: var(--sc);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--panel-faint);
    }

    #panel-header-controls {
      display: flex;
      gap: 28px;
    }

    .panel-ctrl {
      font-family: var(--sc);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--panel-faint);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }
    .panel-ctrl:hover { color: var(--panel-ink); }

    /* ── Satellite name — full width ── */
    #panel-name-row {
      padding: 0 44px 20px;
      flex-shrink: 0;
    }

    #panel-sat-name {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: 52px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--panel-ink);
      line-height: 1.0;
    }

    /* ── Two column: agency+text left, data right ── */
    #panel-columns {
      display: grid;
      grid-template-columns: 58% 42%;
      flex: 1;
      overflow: hidden;
      padding: 0 44px;
      gap: 0 32px;
    }

    /* Left column */
    #panel-left {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #panel-sat-agency {
      font-family: var(--sc);
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--panel-faint);
      flex-shrink: 0;
      padding-bottom: 28px;
    }

    /* Scrollable text */
    #panel-body {
      flex: 1;
      overflow-y: auto;
      position: relative;
      scrollbar-width: none;
    }
    #panel-body::-webkit-scrollbar { display: none; }

    #panel-fade-top {
      position: sticky;
      top: 0;
      height: 40px;
      background: linear-gradient(to bottom, rgb(238,233,221) 30%, transparent 100%);
      z-index: 2;
      pointer-events: none;
      margin-bottom: -40px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #panel-fade-bottom {
      position: sticky;
      bottom: 0;
      height: 80px;
      background: linear-gradient(to top, rgb(238,233,221) 50%, transparent 100%);
      z-index: 2;
      pointer-events: none;
      margin-top: -80px;
    }

    #panel-text-content {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: 15px;
      line-height: 1.82;
      color: var(--panel-ink);
      padding-bottom: 80px;
    }

    #panel-text-content p { margin-bottom: 18px; }
    #panel-text-content p:last-child { margin-bottom: 0; }

    .panel-illustration {
      width: 100%;
      margin: 24px 0;
      opacity: 0.75;
    }

    #panel-loading {
      font-family: var(--sc);
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--panel-faint);
      padding-top: 4px;
    }

    #panel-loading::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }

    /* Right column — data table */
    #panel-right {
      padding-top: 0;
    }

    .panel-data-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 9px 0;
      border-bottom: 1px solid var(--panel-ghost);
    }

    .panel-data-key {
      font-family: var(--sc);
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--panel-faint);
    }

    .panel-data-val {
      font-family: var(--sc);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--panel-ink);
      text-align: right;
    }

    /* Collapsed bar */
    #info-panel.collapsed {
      top: auto;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: min(420px, 90vw);
      height: auto;
    }

    #info-panel.collapsed #panel-name-row,
    #info-panel.collapsed #panel-columns {
      display: none;
    }      display: none;
    }

    #collapsed-label {
      font-family: var(--sc);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--panel-faint);
    }

  </style>
</head>
<body>

<div id="cesium-container"></div>
<div id="grain"></div>

<div id="masthead">
  <div id="masthead-left">
    <span id="masthead-vol">Vol. I</span>
    <span id="masthead-title">Daily Satellite</span>
  </div>
  <div id="masthead-right">
    <div id="clock"></div>
    <div id="season-label"></div>
  </div>
</div>

<div id="daily-card">
  <div id="daily-card-issue"></div>
  <div id="daily-card-name"></div>
  <div id="daily-card-desc"></div>
  <div id="daily-card-cta">Open today's entry</div>
</div>

<div id="sat-tooltip">
  <div id="sat-tooltip-name"></div>
</div>

<div id="season-indicator"></div>
<div id="sat-count"></div>

<!-- ─── INFO PANEL ─────────────────────────────────────────────────────── -->
<div id="info-panel">
  <!-- Header: type left, controls right, no border -->
  <div id="panel-header">
    <div id="panel-sat-type">◆ Loading</div>
    <div id="panel-header-controls">
      <button class="panel-ctrl" id="ctrl-listen" onclick="toggleNarrator()">▶ Listen</button>
      <button class="panel-ctrl" id="ctrl-collapse" onclick="togglePanel()">Collapse</button>
      <button class="panel-ctrl" id="ctrl-close" onclick="closePanel()">Close</button>
    </div>
  </div>

  <!-- Satellite name — full width -->
  <div id="panel-name-row">
    <div id="panel-sat-name">—</div>
  </div>

  <!-- Two columns: left = agency + text, right = data -->
  <div id="panel-columns">
    <div id="panel-left">
      <div id="panel-sat-agency"></div>
      <div id="panel-body">
        <div id="panel-fade-top"></div>
        <div id="panel-text-content">
          <p id="panel-loading">The archivist is searching the files</p>
        </div>
        <div id="panel-fade-bottom"></div>
      </div>
    </div>
    <div id="panel-right">
      <div id="panel-data-block"></div>
    </div>
  </div>
</div>

<script>
// ─── SATELLITE CATALOGUE — real NORAD IDs, TLEs fetched live ─────────────────
const SATELLITE_CATALOGUE = [
  { id: "iss",          name: "ISS",                    norad: 25544, desc: "The International Space Station. 400km above, always occupied since 2000." },
  { id: "tiangong",     name: "Tiangong CSS",            norad: 48274, desc: "China's national space station. A new permanence in orbit." },
  { id: "hubble",       name: "Hubble Space Telescope",  norad: 20580, desc: "Launched blind. Given sight by astronauts. Changed everything." },
  { id: "goes-16",      name: "GOES-16",                 norad: 41866, desc: "Geostationary. Watches the Western hemisphere. Images a hurricane every 30 seconds." },
  { id: "noaa-19",      name: "NOAA-19",                 norad: 33591, desc: "Fell 1.5 metres onto a factory floor during assembly. Nobody had installed the bolts." },
  { id: "terra",        name: "Terra",                   norad: 25994, desc: "NASA's flagship Earth observer. Watching the planet change since 1999." },
  { id: "aqua",         name: "Aqua",                    norad: 27424, desc: "Studying Earth's water cycle. Every ocean, every cloud." },
  { id: "sentinel-2a",  name: "Sentinel-2A",             norad: 40697, desc: "ESA's land monitor. Free imagery for the entire planet, every five days." },
  { id: "landsat-8",    name: "Landsat 8",               norad: 39084, desc: "Fifty years of continuous Earth observation. The longest environmental record from space." },
  { id: "cryosat-2",    name: "CryoSat-2",               norad: 36508, desc: "Measuring ice loss with centimetre precision. The numbers are not reassuring." },
  { id: "swarm-a",      name: "Swarm-A",                 norad: 39452, desc: "Mapping Earth's magnetic field. The invisible architecture that makes life possible." },
  { id: "lageos-1",     name: "LAGEOS-1",                norad: 8820,  desc: "A brass ball covered in mirrors. No electronics. Carries a map of Earth 8 million years from now." },
  { id: "vanguard-1",   name: "Vanguard 1",              norad: 5,     desc: "The oldest human-made object still in orbit. Launched 1958. Will remain for 600 more years." },
  { id: "oscar-7",      name: "OSCAR-7",                 norad: 7530,  desc: "Amateur radio satellite. Died 1981. Came back to life in 2002. Used daily ever since." },
  { id: "jason-3",      name: "Jason-3",                 norad: 41240, desc: "Measuring sea surface height with millimetre precision. The oceans are rising." },
  { id: "starlink-30",  name: "Starlink-30",             norad: 44238, desc: "One of thousands. The constellation that changed what the night sky looks like." },
  { id: "starlink-31",  name: "Starlink-31",             norad: 44239, desc: "One of thousands. Astronomers are still deciding how they feel about this." },
  { id: "gps-63",       name: "GPS BIIR-2",              norad: 24876, desc: "One node in the constellation that tells the world where it is." },
  { id: "galileo-5",    name: "Galileo-5",               norad: 37846, desc: "Europe's answer to GPS. A political act dressed as infrastructure." },
  { id: "envisat",      name: "Envisat",                 norad: 27386, desc: "ESA's largest Earth observation satellite. Went silent in 2012. Still orbiting." },
];

// Active satellite list — populated after TLE fetch
let SATELLITES = [];

// ─── LIVE TLE FETCH ───────────────────────────────────────────────────────────
async function fetchLiveTLEs(catalogue) {
  // Fetch in small parallel batches to avoid overwhelming the server
  const results = [];
  const batchSize = 3;
  for (let i = 0; i < catalogue.length; i += batchSize) {
    const batch = catalogue.slice(i, i + batchSize);
    const batchResults = await Promise.all(batch.map(async sat => {
      try {
        const res = await fetch(`/api/tle/${sat.norad}`);
        if (!res.ok) { console.warn(`TLE ${sat.name}: HTTP ${res.status}`); return null; }
        const data = await res.json();
        if (data.l1 && data.l2) return { ...sat, l1: data.l1, l2: data.l2 };
        return null;
      } catch(e) {
        console.warn(`TLE failed: ${sat.name}`, e.message);
        return null;
      }
    }));
    results.push(...batchResults.filter(Boolean));
    // Small pause between batches
    if (i + batchSize < catalogue.length) {
      await new Promise(r => setTimeout(r, 300));
    }
  }
  console.log(`Loaded ${results.length}/${catalogue.length} TLEs`);
  return results;
}
// ─── SEASON LOGIC ────────────────────────────────────────────────────────────
function getCurrentSeason() {
  const month = new Date().getMonth(); // 0-11
  if (month >= 2 && month <= 4) return { name: "Spring", theme: "The Watchers", key: "spring" };
  if (month >= 5 && month <= 7) return { name: "Summer", theme: "The Scientists", key: "summer" };
  if (month >= 8 && month <= 10) return { name: "Autumn", theme: "The Accidents", key: "autumn" };
  return { name: "Winter", theme: "The Forgotten", key: "winter" };
}

function getSeasonSatellites(seasonKey) {
  return SATELLITES.filter(s => s.season === seasonKey || s.season === "all");
}

// ─── DAILY SATELLITE ─────────────────────────────────────────────────────────
function getDailySatellite(satellites) {
  const LAUNCH_DATE = new Date("2025-04-01");
  const today = new Date();
  const daysSinceLaunch = Math.floor((today - LAUNCH_DATE) / (1000 * 60 * 60 * 24));
  const issueNum = Math.max(1, daysSinceLaunch + 1);
  // Always start with ISS for now so the movement is dramatic on first load
  const iss = satellites.find(s => s.id === "iss");
  if (iss) return { satellite: iss, issueNum };
  const idx = daysSinceLaunch % satellites.length;
  return { satellite: satellites[Math.abs(idx)], issueNum };
}

// ─── CLOCK ───────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const utc = now.toUTCString().replace("GMT", "UTC");
  document.getElementById("clock").textContent = utc;
}

// ─── CESIUM INIT ─────────────────────────────────────────────────────────────
Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI2MjkxMTA5My03ZGQxLTQ4NTgtYmJmMC0yNmYxYjU4MDgwMjEiLCJpZCI6NDA1ODA1LCJpYXQiOjE3NzM5MjAxMTV9.pm6OrxaqD9py-W5nWXurKF7fvLKF87J2Gv1xpHM-LPQ";

// Ensure container fills screen before Cesium init
const cesiumContainer = document.getElementById("cesium-container");
cesiumContainer.style.width = window.innerWidth + "px";
cesiumContainer.style.height = window.innerHeight + "px";

const viewer = new Cesium.Viewer("cesium-container", {
  baseLayerPicker: false,
  animation: false,
  baseLayerPicker: false,
  fullscreenButton: false,
  geocoder: false,
  homeButton: false,
  infoBox: false,
  sceneModePicker: false,
  selectionIndicator: false,
  timeline: false,
  navigationHelpButton: false,
  navigationInstructionInitiallyVisible: false,
  creditContainer: document.createElement("div"),
  skyBox: false,
  skyAtmosphere: false,
  scene3DOnly: true,
  requestRenderMode: false,
});

// Scene settings
const scene = viewer.scene;
const globe = scene.globe;

globe.enableLighting = false;
globe.showGroundAtmosphere = false;
scene.backgroundColor = Cesium.Color.fromCssColorString("#f0ebe0");

// Zoom limits — prevent going inside Earth or flipping upside down
viewer.scene.screenSpaceCameraController.minimumZoomDistance = 200000;  // 200km above surface
viewer.scene.screenSpaceCameraController.maximumZoomDistance = 35000000; // 35,000km

// Remove default imagery and add Bing Maps Aerial
viewer.imageryLayers.removeAll();
Cesium.IonImageryProvider.fromAssetId(2).then(provider => {

// ─── ORBIT DRAWING ───────────────────────────────────────────────────────────
function propagateSatellite(tle1, tle2, date) {
  try {
    const satrec = satellite.twoline2satrec(tle1, tle2);
    const posVel = satellite.propagate(satrec, date);
    if (!posVel.position) return null;
    const gmst = satellite.gstime(date);
    const geo = satellite.eciToGeodetic(posVel.position, gmst);
    return {
      lat: satellite.degreesLat(geo.latitude),
      lon: satellite.degreesLong(geo.longitude),
      alt: geo.height * 1000,
    };
  } catch(e) { return null; }
}

// Draw all satellite dots using SampledPositionProperty driven by Cesium clock
const satDots = [];
let selectedOrbitEntity = null;

function buildSampledPosition(sat) {
  const satrec = satellite.twoline2satrec(sat.l1, sat.l2);
  const periodMinutes = 1440 / satrec.no;
  const periodMs = periodMinutes * 60 * 1000;
  const now = new Date();
  const sampledPos = new Cesium.SampledPositionProperty();

  // Sample 3 full orbits centred on now — past and future
  const steps = 180;
  for (let i = -steps; i <= steps; i++) {
    const t = new Date(now.getTime() + (i / steps) * 3 * periodMs);
    const c = getSatCartesian(sat.l1, sat.l2, t);
    if (c) sampledPos.addSample(Cesium.JulianDate.fromDate(t), c);
  }

  sampledPos.setInterpolationOptions({
    interpolationDegree: 5,
    interpolationAlgorithm: Cesium.LagrangePolynomialApproximation,
  });
  return sampledPos;
}

function drawOrbitsAndDots(satellites) {
  // Set Cesium clock to current time
  viewer.clock.currentTime = Cesium.JulianDate.now();
  viewer.clock.clockStep = Cesium.ClockStep.SYSTEM_CLOCK_MULTIPLIER;
  viewer.clock.multiplier = 1;
  viewer.clock.shouldAnimate = true;

  satellites.forEach((sat, idx) => {
    const sampledPos = buildSampledPosition(sat);

    const dotEntity = viewer.entities.add({
      position: sampledPos,
      point: {
        pixelSize: 5,
        color: Cesium.Color.fromCssColorString("rgba(26,22,16,0.9)"),
        outlineColor: Cesium.Color.TRANSPARENT,
        outlineWidth: 0,
      },
      label: { show: false },
      path: { show: false },
      properties: {
        satId: sat.id,
        satName: sat.name,
        satDesc: sat.desc,
        satIdx: idx,
      },
    });
    satDots.push({ entity: dotEntity, sat, idx, sampledPos });
  });
}

// Get satellite position as ECEF Cartesian3 directly
function getSatCartesian(tle1, tle2, date) {
  try {
    const satrec = satellite.twoline2satrec(tle1, tle2);
    const posVel = satellite.propagate(satrec, date);
    if (!posVel.position) return null;
    const gmst = satellite.gstime(date);
    // Rotate ECI to ECEF directly
    const cosG = Math.cos(gmst), sinG = Math.sin(gmst);
    const x = posVel.position.x * cosG + posVel.position.y * sinG;
    const y = -posVel.position.x * sinG + posVel.position.y * cosG;
    const z = posVel.position.z;
    // satellite.js gives km, Cesium needs metres
    return new Cesium.Cartesian3(x * 1000, y * 1000, z * 1000);
  } catch(e) { return null; }
}

function updateSatPositions() {}

// ─── HOVER DETECTION ─────────────────────────────────────────────────────────
const tooltip = document.getElementById("sat-tooltip");
const tooltipName = document.getElementById("sat-tooltip-name");
let hoveredEntity = null;

const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);

handler.setInputAction((movement) => {
  const pickedObject = scene.pick(movement.endPosition);
  
  if (Cesium.defined(pickedObject) && Cesium.defined(pickedObject.id)) {
    const entity = pickedObject.id;
    const props = entity.properties;
    
    if (props && Cesium.defined(props.satName)) {
      const name = props.satName.getValue();
      tooltipName.textContent = name;
      tooltip.style.left = movement.endPosition.x + "px";
      tooltip.style.top = (movement.endPosition.y - 36) + "px";
      tooltip.style.transform = "translateX(-50%)";
      tooltip.classList.add("visible");
      
      // Enlarge dot on hover
      if (hoveredEntity !== entity) {
        if (hoveredEntity) {
          hoveredEntity.point.pixelSize = 5;
          hoveredEntity.point.color = Cesium.Color.fromCssColorString("rgba(26,22,16,0.9)");
        }
        entity.point.pixelSize = 10;
        entity.point.color = Cesium.Color.fromCssColorString("rgba(26,22,16,1.0)");
        hoveredEntity = entity;
      }
      
      viewer.scene.canvas.style.cursor = "crosshair";
      return;
    }
  }
  
  tooltip.classList.remove("visible");
  if (hoveredEntity) {
    hoveredEntity.point.pixelSize = 5;
    hoveredEntity.point.color = Cesium.Color.fromCssColorString("rgba(26,22,16,0.9)");
    hoveredEntity = null;
  }
  viewer.scene.canvas.style.cursor = "default";
  
}, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

// ─── CLICK HANDLER ───────────────────────────────────────────────────────────
handler.setInputAction((click) => {
  const pickedObject = scene.pick(click.position);
  
  if (Cesium.defined(pickedObject) && Cesium.defined(pickedObject.id)) {
    const entity = pickedObject.id;
    const props = entity.properties;
    
    if (props && Cesium.defined(props.satName)) {
      const satIdx = props.satIdx.getValue();
      const sat = currentSatellites[satIdx];
      
      // Hide daily card
      document.getElementById("daily-card").classList.remove("visible");

      // Open info panel and fly to satellite simultaneously
      openPanel(sat);
      flyToSatellite(sat);
      return;
    }
  }
}, Cesium.ScreenSpaceEventType.LEFT_CLICK);

// ─── FLY TO SATELLITE ────────────────────────────────────────────────────────
let trackedSat = null;
let autoRotate = true;
let lastTime = Date.now();

function flyToSatellite(sat) {
  const found = satDots.find(d => d.sat.id === sat.id);
  if (!found) return;

  autoRotate = false;
  viewer.trackedEntity = undefined;

  const pos = propagateSatellite(sat.l1, sat.l2, new Date());
  if (!pos) return;

  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(pos.lon, pos.lat, pos.alt + 5000),
    orientation: {
      heading: Cesium.Math.toRadians(0),
      pitch: Cesium.Math.toRadians(-90),
      roll: 0,
    },
    duration: 2.5,
    easingFunction: Cesium.EasingFunction.CUBIC_IN_OUT,
    complete: () => {
      viewer.trackedEntity = found.entity;
    }
  });
}

// ─── GLOBE ROTATION at real Earth rate ───────────────────────────────────────
// Earth completes one sidereal rotation in 86164 seconds
const EARTH_ROTATION_RATE = (2 * Math.PI) / 86164;

scene.postRender.addEventListener(() => {
  if (!autoRotate || viewer.trackedEntity) return;
  const now = Date.now();
  const delta = (now - lastTime) / 1000;
  lastTime = now;
  viewer.camera.rotate(Cesium.Cartesian3.UNIT_Z, -EARTH_ROTATION_RATE * delta);
});

viewer.scene.canvas.addEventListener("mousedown", () => { autoRotate = false; });
viewer.scene.canvas.addEventListener("touchstart", () => { autoRotate = false; });

// ─── NARRATOR ────────────────────────────────────────────────────────────────
let narratorAudio = null;
let narratorPlaying = false;

async function toggleNarrator() {
  const btn = document.getElementById("ctrl-listen");

  // If playing — pause
  if (narratorPlaying && narratorAudio) {
    narratorAudio.pause();
    narratorPlaying = false;
    btn.textContent = "▶ Resume";
    return;
  }

  // If paused — resume
  if (!narratorPlaying && narratorAudio) {
    narratorAudio.play();
    narratorPlaying = true;
    btn.textContent = "◼ Pause";
    return;
  }

  // Fresh start
  const textEl = document.getElementById("panel-text-content");
  const text = textEl.innerText.trim();
  if (!text || text.includes("archivist is searching")) return;

  btn.textContent = "… Loading";

  try {
    const res = await fetch("/api/narrate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, satId: currentPanelSat?.id })
    });

    if (!res.ok) {
      const err = await res.json();
      btn.textContent = `✕ ${err.error || res.status}`;
      setTimeout(() => btn.textContent = "▶ Listen", 4000);
      return;
    }

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    narratorAudio = new Audio(url);
    narratorAudio.play();
    narratorPlaying = true;
    btn.textContent = "◼ Pause";

    narratorAudio.onended = () => {
      narratorPlaying = false;
      narratorAudio = null;
      btn.textContent = "▶ Listen";
      URL.revokeObjectURL(url);
    };
  } catch(e) {
    btn.textContent = `✕ ${e.message}`;
    setTimeout(() => btn.textContent = "▶ Listen", 4000);
  }
}

async function openPanel(sat) {
  currentPanelSat = sat;
  panelCollapsed = false;

  const panel = document.getElementById("info-panel");
  const details = SAT_DETAILS[sat.id] || {};

  // Set header
  document.getElementById("panel-sat-type").textContent = `◆ ${details.type || "Satellite"}`;
  document.getElementById("panel-sat-name").textContent = sat.name;
  document.getElementById("panel-sat-agency").textContent = details.agency || "";

  // Set data table
  const dataEl = document.getElementById("panel-data-block");
  const rows = [
    ["Altitude", details.alt],
    ["Inclination", details.inc],
    ["Period", details.period],
    ["Launched", details.launched],
  ].filter(([, v]) => v);

  dataEl.innerHTML = rows.map(([k, v]) => `
    <div class="panel-data-row">
      <span class="panel-data-key">${k}</span>
      <span class="panel-data-val">${v}</span>
    </div>
  `).join("");

  // Show loading state
  const textEl = document.getElementById("panel-text-content");
  textEl.innerHTML = `<p id="panel-loading">The archivist is searching the files</p>`;

  // Show panel
  panel.classList.remove("collapsed");
  panel.classList.add("visible");

  // Disable listen until text loads
  const listenBtn = document.getElementById("ctrl-listen");
  listenBtn.textContent = "▶ Listen";
  listenBtn.disabled = true;
  listenBtn.style.opacity = "0.3";
  listenBtn.style.cursor = "default";

  // Top fade only visible when scrolled
  const body = document.getElementById("panel-body");
  const fadeTop = document.getElementById("panel-fade-top");
  fadeTop.style.opacity = "0";
  body.onscroll = () => {
    fadeTop.style.opacity = body.scrollTop > 20 ? "1" : "0";
  };

  // Fetch story from Claude
  try {
    const res = await fetch("/api/story", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: sat.id, name: sat.name, desc: sat.desc })
    });
    const data = await res.json();
    if (data.text) {
      const paragraphs = data.text.split(/\n+/).filter(p => p.trim().length > 0);
      textEl.innerHTML = paragraphs.map(p => `<p>${p}</p>`).join("");
      listenBtn.disabled = false;
      listenBtn.style.opacity = "1";
      listenBtn.style.cursor = "pointer";
    } else {
      textEl.innerHTML = `<p style="font-style:italic;opacity:0.5">${data.error || "The archivist could not be reached."}</p>`;
    }
  } catch(e) {
    textEl.innerHTML = `<p style="font-style:italic;opacity:0.5">The archivist could not be reached.</p>`;
  }
}
