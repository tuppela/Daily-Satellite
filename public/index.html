<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Daily Satellite</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Instrument+Serif:ital@0;1&family=Source+Code+Pro:wght@300;400;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet" />

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.0.0/satellite.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0ebe0;
      --ink: #1a1610;
      --ink-mid: rgba(26,22,16,0.35);
      --ink-faint: rgba(26,22,16,0.12);
      --serif: 'IM Fell English', Georgia, serif;
      --serif-sc: 'IM Fell English SC', Georgia, serif;
      --mono: 'Courier Prime', 'Courier New', monospace;
      --sc: 'Source Code Pro', 'Courier New', monospace;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: var(--serif);
      color: var(--ink);
    }

    #map {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: var(--bg);
    }

    /* Hide Mapbox logo */
    .mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib { display: none !important; }
    .mapboxgl-canvas { outline: none; }

    /* Grain overlay */
    #grain {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
      opacity: 0.028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    /* Masthead */
    #masthead {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      padding: 12px 32px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      border-bottom: 1px solid var(--ink-faint);
      background: linear-gradient(to bottom, var(--bg) 70%, transparent);
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    #masthead.visible { opacity: 1; }

    #masthead-left {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    #masthead-vol {
      font-family: var(--sc);
      font-size: 8px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0.35;
    }

    #masthead-title {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 22px;
      letter-spacing: 0.01em;
      opacity: 0.9;
      text-align: center;
      justify-self: center;
    }

    #masthead-right {
      font-family: var(--sc);
      font-size: 8px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.35;
      text-align: right;
      line-height: 1.7;
    }

    /* Satellite tooltip */
    #sat-tooltip {
      position: fixed;
      z-index: 60;
      background: var(--bg);
      border: 1px solid var(--ink-faint);
      padding: 6px 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }
    #sat-tooltip.visible { opacity: 1; }
    #sat-tooltip-name {
      font-family: var(--sc);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink);
    }

    /* Sat count */
    #sat-count {
      position: fixed;
      bottom: 24px;
      left: 32px;
      z-index: 50;
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.25em;
      opacity: 0;
      color: var(--ink);
      transition: opacity 1s ease;
    }
    #sat-count.visible { opacity: 0.3; }

    /* Season indicator */
    #season-indicator {
      position: fixed;
      bottom: 24px;
      right: 32px;
      z-index: 50;
      font-family: var(--sc);
      font-size: 8px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0;
      color: var(--ink);
      transition: opacity 1s ease;
      text-align: right;
    }
    #season-indicator.visible { opacity: 0.3; }

    /* Daily card */
    #daily-card {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      z-index: 60;
      background: var(--bg);
      border: 1px solid var(--ink-faint);
      padding: 24px 28px;
      width: min(340px, 88vw);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease, transform 0.8s ease;
      cursor: pointer;
    }
    #daily-card.visible {
      opacity: 1;
      pointer-events: all;
      transform: translateX(-50%) translateY(0);
    }
    #daily-card-issue {
      font-family: var(--sc);
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0.4;
      margin-bottom: 8px;
    }
    #daily-card-name {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--ink);
    }
    #daily-card-desc {
      font-family: var(--serif);
      font-size: 13px;
      font-style: italic;
      opacity: 0.65;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    #daily-card-cta {
      font-family: var(--sc);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0.45;
    }
    #daily-card:hover #daily-card-cta { opacity: 0.8; }

    /* ─── INFO PANEL ── */
    :root {
      --panel-bg: rgb(238, 233, 221);
      --panel-border: rgba(26, 22, 16, 0.14);
      --panel-ink: rgba(26, 22, 16, 0.88);
      --panel-faint: rgba(26, 22, 16, 0.38);
      --panel-ghost: rgba(26, 22, 16, 0.09);

    #info-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.96);

      border: 1px solid var(--panel-border);
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    #info-panel.visible {
      opacity: 1;
      pointer-events: all;
      transform: translate(-50%, -50%) scale(1);
    }

    #panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 44px 16px;
      flex-shrink: 0;
    }
    #panel-sat-type {
      font-family: var(--sc);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--panel-faint);
    }
    #panel-header-controls { display: flex; gap: 28px; }
    .panel-ctrl {
      font-family: var(--sc);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--panel-faint);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }
    .panel-ctrl:hover { color: var(--panel-ink); }
    .panel-ctrl:disabled { opacity: 0.3; cursor: default; }

      flex-shrink: 0;

    #panel-sat-name {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: 52px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--panel-ink);
      line-height: 1.0;
    }

    #panel-columns {
      display: grid;
      grid-template-columns: 58% 42%;
      flex: 1;
      overflow: hidden;
      padding: 0 44px;
      gap: 0 32px;
    }

    #panel-left {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #panel-sat-agency {
      font-family: var(--sc);
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--panel-faint);
      flex-shrink: 0;
      padding-bottom: 28px;
    }

    #panel-body {
      flex: 1;
      overflow-y: auto;
      position: relative;
      scrollbar-width: none;
    }
    #panel-body::-webkit-scrollbar { display: none; }

    #panel-fade-top {
      position: sticky;
      top: 0;
      height: 40px;
      background: linear-gradient(to bottom, rgb(238,233,221) 30%, transparent 100%);
      z-index: 2;
      pointer-events: none;
      margin-bottom: -40px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #panel-fade-bottom {
      position: sticky;
      bottom: 0;
      height: 80px;
      background: linear-gradient(to top, rgb(238,233,221) 50%, transparent 100%);
      z-index: 2;
      pointer-events: none;
      margin-top: -80px;
    }

    #panel-text-content {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: 15px;
      line-height: 1.82;
      color: var(--panel-ink);
      padding-bottom: 80px;
    }
    #panel-text-content p { margin-bottom: 18px; }
    #panel-text-content p:last-child { margin-bottom: 0; }

    #panel-loading {
      font-family: var(--sc);
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--panel-faint);
      padding-top: 4px;
    }
    #panel-loading::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }

    #panel-right { padding-top: 0; }
    .panel-data-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 9px 0;
      border-bottom: 1px solid var(--panel-ghost);
    }
    .panel-data-key {
      font-family: var(--sc);
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--panel-faint);
    }
    .panel-data-val {
      font-family: var(--sc);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--panel-ink);
      text-align: right;
    }

    #info-panel.collapsed {
      top: auto; bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: min(420px, 90vw);
      height: auto;
    }
    #info-panel.collapsed #panel-name-row,
    #info-panel.collapsed #panel-columns { display: none; }

    #collapsed-label {
      font-family: var(--sc);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--panel-faint);
    }
  </style>
</head>

// ─── TLE FETCH ────────────────────────────────────────────────────────────────
async function fetchLiveTLEs(catalogue) {
  const results = [];
  const batchSize = 3;
  for (let i = 0; i < catalogue.length; i += batchSize) {
    const batch = catalogue.slice(i, i + batchSize);
    const batchResults = await Promise.all(batch.map(async sat => {
      try {
        const res = await fetch(`/api/tle/${sat.norad}`);
        if (!res.ok) return null;
        const data = await res.json();
        if (data.l1 && data.l2) return { ...sat, l1: data.l1, l2: data.l2 };
        return null;
      } catch(e) { return null; }
    }));
    results.push(...batchResults.filter(Boolean));
    if (i + batchSize < catalogue.length) await new Promise(r => setTimeout(r, 300));
  }
  return results;
}

// ─── SEASON / DAILY ──────────────────────────────────────────────────────────
function getCurrentSeason() {
  const m = new Date().getMonth();
  if (m >= 2 && m <= 4) return { name: "Spring", theme: "The Watchers", key: "spring" };
  if (m >= 5 && m <= 7) return { name: "Summer", theme: "The Scientists", key: "summer" };
  if (m >= 8 && m <= 10) return { name: "Autumn", theme: "The Accidents", key: "autumn" };
  return { name: "Winter", theme: "The Forgotten", key: "winter" };
}

function getDailySatellite(satellites) {
  const LAUNCH_DATE = new Date("2025-04-01");
  const today = new Date();
  const daysSinceLaunch = Math.floor((today - LAUNCH_DATE) / (1000 * 60 * 60 * 24));
  const issueNum = Math.max(1, daysSinceLaunch + 1);
  const iss = satellites.find(s => s.id === "iss");
  if (iss) return { satellite: iss, issueNum };
  return { satellite: satellites[Math.abs(daysSinceLaunch % satellites.length)], issueNum };
}

// ─── CLOCK ───────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById("clock").textContent = now.toUTCString().replace("GMT", "UTC");
}

// ─── SATELLITE PROPAGATION ───────────────────────────────────────────────────
function propagateSatellite(tle1, tle2, date) {
  try {
    const satrec = satellite.twoline2satrec(tle1, tle2);
    const posVel = satellite.propagate(satrec, date);
    if (!posVel.position) return null;
    const gmst = satellite.gstime(date);
    const geo = satellite.eciToGeodetic(posVel.position, gmst);
    return {
      lat: satellite.degreesLat(geo.latitude),
      lon: satellite.degreesLong(geo.longitude),
      alt: geo.height,
    };
  } catch(e) { return null; }
}

// Get trail points — past N minutes
function getTrailPoints(tle1, tle2, minutes = 20) {
  const points = [];
  const now = Date.now();
  const steps = 60;
  for (let i = steps; i >= 0; i--) {
    const t = new Date(now - (i / steps) * minutes * 60 * 1000);
    const pos = propagateSatellite(tle1, tle2, t);
    if (pos) points.push([pos.lon, pos.lat]);
  }
  return points;
}

// ─── MAPBOX INIT ─────────────────────────────────────────────────────────────
mapboxgl.accessToken = window.MAPBOX_TOKEN || "";

const map = new mapboxgl.Map({
  container: "map",
  style: "mapbox://styles/mapbox/satellite-v9",
  projection: "globe",
  zoom: 1.8,
  center: [10, 25],
  pitch: 0,
  bearing: 0,
  minZoom: 0.5,
  maxZoom: 18,
  attributionControl: false,
  logoPosition: "bottom-left",
});

// Colour grading to match Cesium/Bing warmth
map.on("style.load", () => {
  // Warm, slightly desaturated — matches Bing aerial character
  map.setPaintProperty("satellite", "raster-saturation", -0.12);
  map.setPaintProperty("satellite", "raster-contrast", -0.04);
  map.setPaintProperty("satellite", "raster-brightness-min", 0.02);
  map.setPaintProperty("satellite", "raster-hue-rotate", 6);

  // Parchment fog/atmosphere
  map.setFog({
    color: "#f0ebe0",
    "high-color": "#c8bfb0",
    "horizon-blend": 0.08,
    "space-color": "#f0ebe0",
    "star-intensity": 0,
  });

  initSatelliteLayers();
});

// ─── AUTO-ROTATION ────────────────────────────────────────────────────────────
let autoRotate = true;
let isTracking = false;
let trackedSatId = null;
const EARTH_DEG_PER_SEC = 360 / 86164;
let lastRotateTime = Date.now();

function rotationLoop() {
  if (autoRotate && !isTracking) {
    const now = Date.now();
    const delta = (now - lastRotateTime) / 1000;
    lastRotateTime = now;
    const bearing = map.getBearing() - EARTH_DEG_PER_SEC * delta;
    map.setBearing(bearing);
  }
  requestAnimationFrame(rotationLoop);
}

map.on("mousedown", () => { autoRotate = false; isTracking = false; trackedSatId = null; });
map.on("touchstart", () => { autoRotate = false; isTracking = false; trackedSatId = null; });

// ─── SATELLITE LAYERS ────────────────────────────────────────────────────────
function initSatelliteLayers() {
  // Trails source
  map.addSource("sat-trails", {
    type: "geojson",
    data: { type: "FeatureCollection", features: [] }
  });

  // Dots source
  map.addSource("sat-dots", {
    type: "geojson",
    data: { type: "FeatureCollection", features: [] }
  });

  // Trail lines
  map.addLayer({
    id: "sat-trails-layer",
    type: "line",
    source: "sat-trails",
    paint: {
      "line-color": "#1a1610",
      "line-width": 0.8,
      "line-opacity": 0.35,
    }
  });

  // Satellite dots
  map.addLayer({
    id: "sat-dots-layer",
    type: "circle",
    source: "sat-dots",
    paint: {
      "circle-radius": 4,
      "circle-color": "#1a1610",
      "circle-opacity": 0.9,
      "circle-stroke-width": 0,
    }
  });

  // Hover cursor
  map.on("mouseenter", "sat-dots-layer", () => { map.getCanvas().style.cursor = "pointer"; });
  map.on("mouseleave", "sat-dots-layer", () => { map.getCanvas().style.cursor = ""; });

  // Hover tooltip
  const tooltip = document.getElementById("sat-tooltip");
  const tooltipName = document.getElementById("sat-tooltip-name");

  map.on("mousemove", "sat-dots-layer", (e) => {
    const props = e.features[0].properties;
    tooltipName.textContent = props.name;
    tooltip.style.left = e.point.x + "px";
    tooltip.style.top = (e.point.y - 36) + "px";
    tooltip.classList.add("visible");
  });

  map.on("mouseleave", "sat-dots-layer", () => {
    tooltip.classList.remove("visible");
  });

  // Click handler
  map.on("click", "sat-dots-layer", (e) => {
    const props = e.features[0].properties;
    const sat = currentSatellites.find(s => s.id === props.id);
    if (!sat) return;
    document.getElementById("daily-card").classList.remove("visible");
    openPanel(sat);
    flyToSatellite(sat);
  });
}

// ─── UPDATE SATELLITE POSITIONS ──────────────────────────────────────────────
function updateSatellitePositions() {
  if (!currentSatellites.length) return;
  if (!map.getSource("sat-dots")) return;

  const now = new Date();
  const dotFeatures = [];
  const trailFeatures = [];

  currentSatellites.forEach(sat => {
    const pos = propagateSatellite(sat.l1, sat.l2, now);
    if (!pos) return;

    dotFeatures.push({
      type: "Feature",
      geometry: { type: "Point", coordinates: [pos.lon, pos.lat] },
      properties: { id: sat.id, name: sat.name, desc: sat.desc }
    });

    // Trail
    const trail = getTrailPoints(sat.l1, sat.l2, 15);
    if (trail.length > 1) {
      trailFeatures.push({
        type: "Feature",
        geometry: { type: "LineString", coordinates: trail },
        properties: { id: sat.id }
      });
    }
  });

  map.getSource("sat-dots").setData({ type: "FeatureCollection", features: dotFeatures });
  map.getSource("sat-trails").setData({ type: "FeatureCollection", features: trailFeatures });

  // Track selected satellite
  if (isTracking && trackedSatId) {
    const sat = currentSatellites.find(s => s.id === trackedSatId);
    if (sat) {
      const pos = propagateSatellite(sat.l1, sat.l2, now);
      if (pos) {
        map.setCenter([pos.lon, pos.lat]);
      }
    }
  }
}

// ─── FLY TO SATELLITE ────────────────────────────────────────────────────────
function flyToSatellite(sat) {
  autoRotate = false;
  const pos = propagateSatellite(sat.l1, sat.l2, new Date());
  if (!pos) return;

  // Zoom level based on altitude — LEO close, GEO far
  const zoom = pos.alt < 1000 ? 5 : pos.alt < 5000 ? 3.5 : 2;

  map.flyTo({
    center: [pos.lon, pos.lat],
    zoom,
    pitch: 0,
    bearing: map.getBearing(),
    duration: 2500,
    easing: t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t,
  });

  // Start tracking after fly
  setTimeout(() => {
    isTracking = true;
    trackedSatId = sat.id;
  }, 2600);
}

// ─── DAILY CARD ───────────────────────────────────────────────────────────────
function initDailyCard(satellites) {
  if (!satellites || satellites.length === 0) return;
  const { satellite: daily, issueNum } = getDailySatellite(satellites);
  document.getElementById("daily-card-issue").textContent = `Issue No. ${issueNum} — Daily Satellite`;
  document.getElementById("daily-card-name").textContent = daily.name;
  document.getElementById("daily-card-desc").textContent = daily.desc;
  document.getElementById("daily-card").addEventListener("click", () => {
    document.getElementById("daily-card").classList.remove("visible");
    openPanel(daily);
    flyToSatellite(daily);
  });
  setTimeout(() => document.getElementById("daily-card").classList.add("visible"), 3500);
}

// ─── INFO PANEL ───────────────────────────────────────────────────────────────
async function openPanel(sat) {
  currentPanelSat = sat;
  const panel = document.getElementById("info-panel");
  const details = SAT_DETAILS[sat.id] || {};

  document.getElementById("panel-sat-type").textContent = `◆ ${details.type || "Satellite"}`;
  document.getElementById("panel-sat-name").textContent = sat.name;
  document.getElementById("panel-sat-agency").textContent = details.agency || "";

  const dataEl = document.getElementById("panel-data-block");
  const rows = [
    ["Altitude", details.alt],
    ["Inclination", details.inc],
    ["Period", details.period],
    ["Launched", details.launched],
  ].filter(([, v]) => v);
  dataEl.innerHTML = rows.map(([k, v]) => `
    <div class="panel-data-row">
      <span class="panel-data-key">${k}</span>
      <span class="panel-data-val">${v}</span>
    </div>`).join("");

  const textEl = document.getElementById("panel-text-content");
  textEl.innerHTML = `<p id="panel-loading">The archivist is searching the files</p>`;

  panel.classList.remove("collapsed");
  panel.classList.add("visible");

  const listenBtn = document.getElementById("ctrl-listen");
  listenBtn.textContent = "▶ Listen";
  listenBtn.disabled = true;
  listenBtn.style.opacity = "0.3";
  listenBtn.style.cursor = "default";

  const body = document.getElementById("panel-body");
  const fadeTop = document.getElementById("panel-fade-top");
  fadeTop.style.opacity = "0";
  body.onscroll = () => { fadeTop.style.opacity = body.scrollTop > 20 ? "1" : "0"; };

  try {
    const res = await fetch("/api/story", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: sat.id, name: sat.name, desc: sat.desc })
    });
    const data = await res.json();
    if (data.text) {
      const paragraphs = data.text.split(/\n+/).filter(p => p.trim().length > 0);
      textEl.innerHTML = paragraphs.map(p => `<p>${p}</p>`).join("");
      listenBtn.disabled = false;
      listenBtn.style.opacity = "1";
      listenBtn.style.cursor = "pointer";
    } else {
      textEl.innerHTML = `<p style="font-style:italic;opacity:0.5">${data.error || "The archivist could not be reached."}</p>`;
    }
  } catch(e) {
    textEl.innerHTML = `<p style="font-style:italic;opacity:0.5">The archivist could not be reached.</p>`;
  }
}

function togglePanel() {
  const panel = document.getElementById("info-panel");
  const collapsed = panel.classList.toggle("collapsed");
  document.getElementById("ctrl-collapse").textContent = collapsed ? "↗ Expand" : "Collapse";
}

function closePanel() {
  document.getElementById("info-panel").classList.remove("visible");
  currentPanelSat = null;
  isTracking = false;
  trackedSatId = null;
  if (narratorAudio) { narratorAudio.pause(); narratorAudio = null; narratorPlaying = false; }
}

// ─── NARRATOR ────────────────────────────────────────────────────────────────
async function toggleNarrator() {
  const btn = document.getElementById("ctrl-listen");
  if (narratorPlaying && narratorAudio) {
    narratorAudio.pause();
    narratorPlaying = false;
    btn.textContent = "▶ Resume";
    return;
  }
  if (!narratorPlaying && narratorAudio) {
    narratorAudio.play();
    narratorPlaying = true;
    btn.textContent = "◼ Pause";
    return;
  }
  const textEl = document.getElementById("panel-text-content");
  const text = textEl.innerText.trim();
  if (!text || text.includes("archivist is searching")) return;
  btn.textContent = "… Loading";
  try {
    const res = await fetch("/api/narrate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, satId: currentPanelSat?.id })
    });
    if (!res.ok) {
      const err = await res.json();
      btn.textContent = `✕ ${err.error || res.status}`;
      setTimeout(() => btn.textContent = "▶ Listen", 4000);
      return;
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    narratorAudio = new Audio(url);
    narratorAudio.play();
    narratorPlaying = true;
    btn.textContent = "◼ Pause";
    narratorAudio.onended = () => {
      narratorPlaying = false;
      narratorAudio = null;
      btn.textContent = "▶ Listen";
      URL.revokeObjectURL(url);
    };
  } catch(e) {
    btn.textContent = `✕ ${e.message}`;
    setTimeout(() => btn.textContent = "▶ Listen", 4000);
  }
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
const season = getCurrentSeason();
document.getElementById("season-label").textContent = season.theme;
document.getElementById("season-indicator").textContent = `${season.name} — ${season.theme}`;

updateClock();
setInterval(updateClock, 1000);

document.getElementById("masthead").classList.add("visible");
document.getElementById("season-indicator").classList.add("visible");

map.on("load", async () => {
  rotationLoop();

  document.getElementById("sat-count").textContent = "Fetching orbital data…";
  SATELLITES = await fetchLiveTLEs(SATELLITE_CATALOGUE);
  currentSatellites = SATELLITES;

  document.getElementById("sat-count").textContent = `${SATELLITES.length} objects tracked`;
  document.getElementById("sat-count").classList.add("visible");

  // Initial draw
  updateSatellitePositions();

  // Update every second for smooth movement
  setInterval(updateSatellitePositions, 1000);

  setTimeout(() => initDailyCard(currentSatellites), 3500);
});
</script>
