<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbital Register</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.0.0/satellite.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0ebe0;
      --ink: #1a1610;
      --ink-mid: rgba(26,22,16,0.35);
      --ink-faint: rgba(26,22,16,0.12);
      --ink-ghost: rgba(26,22,16,0.06);
      --parchment: #ede6d6;
      --serif: 'IM Fell English', Georgia, serif;
      --serif-sc: 'IM Fell English SC', Georgia, serif;
      --mono: 'Courier Prime', 'Courier New', monospace;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: var(--serif);
      color: var(--ink);
    }

    /* Cesium container */
    #cesium-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
    }

    /* Force cesium canvas to fill container */
    #cesium-container canvas {
      width: 100% !important;
      height: 100% !important;
      position: absolute;
      top: 0;
      left: 0;
    }

    .cesium-viewer,
    .cesium-viewer-cesiumWidgetContainer,
    .cesium-widget,
    .cesium-widget canvas {
      width: 100% !important;
      height: 100% !important;
    }

    /* Hide ALL Cesium UI chrome */
    .cesium-widget-credits,
    .cesium-viewer-toolbar,
    .cesium-viewer-animationContainer,
    .cesium-viewer-timelineContainer,
    .cesium-viewer-bottom,
    .cesium-viewer-fullscreenContainer,
    .cesium-viewer-geocoderContainer,
    .cesium-viewer-navigationHelpButtonContainer,
    .cesium-viewer-infoBoxContainer,
    .cesium-viewer-selectionIndicatorContainer,
    .cesium-navigationInstructionInitial,
    .cesium-credit-logoContainer,
    .cesium-credit-textContainer {
      display: none !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }

    /* Grain overlay for warmth */
    #grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      opacity: 0.028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
    }

    /* Header — masthead */
    #masthead {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      padding: 18px 32px 14px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid var(--ink-faint);
      background: linear-gradient(to bottom, var(--bg) 70%, transparent);
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    #masthead.visible { opacity: 1; }

    #masthead-left {
      display: flex;
      align-items: baseline;
      gap: 20px;
    }

    #masthead-vol {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0.4;
    }

    #masthead-title {
      font-family: var(--serif-sc);
      font-size: 20px;
      letter-spacing: 0.08em;
      opacity: 0.85;
    }

    #masthead-right {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.35;
      text-align: right;
      line-height: 1.6;
      pointer-events: none;
    }

    /* Daily Satellite card */
    #daily-card {
      position: fixed;
      bottom: 52px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      z-index: 60;
      width: 280px;
      border: 1px solid var(--ink);
      background: var(--bg);
      padding: 20px 24px 18px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.8s ease, transform 0.8s ease, box-shadow 0.3s ease;
    }
    #daily-card.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #daily-card:hover {
      box-shadow: 3px 3px 0 var(--ink);
    }

    #daily-card-issue {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      opacity: 0.4;
      margin-bottom: 8px;
    }

    #daily-card-name {
      font-family: var(--serif-sc);
      font-size: 19px;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    #daily-card-desc {
      font-family: var(--serif);
      font-style: italic;
      font-size: 12px;
      opacity: 0.6;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    #daily-card-cta {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0.5;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #daily-card-cta::after {
      content: '→';
      font-family: var(--serif);
      font-size: 14px;
      opacity: 0.7;
    }

    /* Hover tooltip for satellites */
    #sat-tooltip {
      position: fixed;
      z-index: 70;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      transform: translateX(-50%);
    }
    #sat-tooltip.visible { opacity: 1; }
    #sat-tooltip-name {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink);
      white-space: nowrap;
      background: var(--bg);
      padding: 3px 8px;
      border: 1px solid var(--ink-mid);
    }

    /* Season indicator */
    #season-indicator {
      position: fixed;
      bottom: 24px;
      right: 32px;
      z-index: 50;
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0;
      color: var(--ink);
      transition: opacity 1s ease;
      text-align: right;
      line-height: 1.8;
    }
    #season-indicator.visible { opacity: 0.3; }

    /* Sat count */
    #sat-count {
      position: fixed;
      bottom: 24px;
      left: 32px;
      z-index: 50;
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.25em;
      opacity: 0;
      color: var(--ink);
      transition: opacity 1s ease;
    }
    #sat-count.visible { opacity: 0.3; }

  </style>
</head>
<body>

<div id="cesium-container"></div>
<div id="grain"></div>

<div id="masthead">
  <div id="masthead-left">
    <span id="masthead-vol">Vol. I</span>
    <span id="masthead-title">Orbital Register</span>
  </div>
  <div id="masthead-right">
    <div id="clock"></div>
    <div id="season-label"></div>
  </div>
</div>

<div id="daily-card">
  <div id="daily-card-issue"></div>
  <div id="daily-card-name"></div>
  <div id="daily-card-desc"></div>
  <div id="daily-card-cta">Open today's entry</div>
</div>

<div id="sat-tooltip">
  <div id="sat-tooltip-name"></div>
</div>

<div id="season-indicator"></div>
<div id="sat-count"></div>

<script>
// ─── SATELLITE CATALOGUE — real NORAD IDs, TLEs fetched live ─────────────────
const SATELLITE_CATALOGUE = [
  { id: "iss",          name: "ISS",                    norad: 25544, season: "all",    desc: "The International Space Station. 400km above, always occupied since 2000." },
  { id: "tiangong",     name: "Tiangong CSS",            norad: 48274, season: "all",    desc: "China's national space station. A new permanence in orbit." },
  { id: "hubble",       name: "Hubble Space Telescope",  norad: 20580, season: "autumn", desc: "Launched blind. Given sight by astronauts. Changed everything." },
  { id: "goes-16",      name: "GOES-16",                 norad: 41866, season: "summer", desc: "Geostationary. Watches the Western hemisphere. Images a hurricane every 30 seconds." },
  { id: "noaa-19",      name: "NOAA-19",                 norad: 33591, season: "summer", desc: "Fell 1.5 metres onto a factory floor during assembly. Nobody had installed the bolts." },
  { id: "terra",        name: "Terra",                   norad: 25994, season: "autumn", desc: "NASA's flagship Earth observer. Watching the planet change since 1999." },
  { id: "aqua",         name: "Aqua",                    norad: 27424, season: "autumn", desc: "Studying Earth's water cycle. Every ocean, every cloud." },
  { id: "sentinel-2a",  name: "Sentinel-2A",             norad: 40697, season: "autumn", desc: "ESA's land monitor. Free imagery for the entire planet, every five days." },
  { id: "landsat-8",    name: "Landsat 8",               norad: 39084, season: "autumn", desc: "Fifty years of continuous Earth observation. The longest environmental record from space." },
  { id: "cryosat-2",    name: "CryoSat-2",               norad: 36508, season: "autumn", desc: "Measuring ice loss with centimetre precision. The numbers are not reassuring." },
  { id: "swarm-a",      name: "Swarm-A",                 norad: 39452, season: "autumn", desc: "Mapping Earth's magnetic field. The invisible architecture that makes life possible." },
  { id: "lageos-1",     name: "LAGEOS-1",                norad: 8820,  season: "winter", desc: "A brass ball covered in mirrors. No electronics. Carries a map of Earth 8 million years from now." },
  { id: "vanguard-1",   name: "Vanguard 1",              norad: 5,     season: "winter", desc: "The oldest human-made object still in orbit. Launched 1958. Will remain for 600 more years." },
  { id: "oscar-7",      name: "OSCAR-7",                 norad: 7530,  season: "winter", desc: "Amateur radio satellite. Died 1981. Came back to life in 2002. Used daily ever since." },
  { id: "starlink-1007",name: "Starlink-1007",           norad: 44713, season: "all",    desc: "One of thousands. The constellation that changed what the night sky looks like." },
  { id: "jason-3",      name: "Jason-3",                 norad: 41240, season: "autumn", desc: "Measuring sea surface height with millimetre precision. The oceans are rising." },
  { id: "lacrosse-5",   name: "USA-182",                 norad: 28646, season: "spring", desc: "Radar imaging. Sees through cloud and darkness. Officially unacknowledged." },
];

// Active satellite list — populated after TLE fetch
let SATELLITES = [];

// ─── LIVE TLE FETCH via server batch proxy ───────────────────────────────────
async function fetchLiveTLEs(catalogue) {
  const noradIds = catalogue.map(s => s.norad).join(",");
  try {
    const res = await fetch(`/api/tle/batch?ids=${noradIds}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const tleMap = await res.json();
    console.log(`Batch TLE returned ${Object.keys(tleMap).length} satellites`);

    return catalogue
      .map(sat => {
        const tle = tleMap[sat.norad];
        if (!tle) { console.warn(`No TLE for ${sat.name} (${sat.norad})`); return null; }
        return { ...sat, l1: tle.l1, l2: tle.l2 };
      })
      .filter(Boolean);
  } catch(e) {
    console.error("Batch TLE fetch failed:", e);
    return [];
  }
}
// ─── SEASON LOGIC ────────────────────────────────────────────────────────────
function getCurrentSeason() {
  const month = new Date().getMonth(); // 0-11
  if (month >= 2 && month <= 4) return { name: "Spring", theme: "The Watchers", key: "spring" };
  if (month >= 5 && month <= 7) return { name: "Summer", theme: "The Scientists", key: "summer" };
  if (month >= 8 && month <= 10) return { name: "Autumn", theme: "The Accidents", key: "autumn" };
  return { name: "Winter", theme: "The Forgotten", key: "winter" };
}

function getSeasonSatellites(seasonKey) {
  return SATELLITES.filter(s => s.season === seasonKey || s.season === "all");
}

// ─── DAILY SATELLITE ─────────────────────────────────────────────────────────
function getDailySatellite(satellites) {
  const LAUNCH_DATE = new Date("2025-04-01");
  const today = new Date();
  const daysSinceLaunch = Math.floor((today - LAUNCH_DATE) / (1000 * 60 * 60 * 24));
  const issueNum = Math.max(1, daysSinceLaunch + 1);
  const idx = daysSinceLaunch % satellites.length;
  return { satellite: satellites[Math.abs(idx)], issueNum };
}

// ─── CLOCK ───────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const utc = now.toUTCString().replace("GMT", "UTC");
  document.getElementById("clock").textContent = utc;
}

// ─── CESIUM INIT ─────────────────────────────────────────────────────────────
Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI2MjkxMTA5My03ZGQxLTQ4NTgtYmJmMC0yNmYxYjU4MDgwMjEiLCJpZCI6NDA1ODA1LCJpYXQiOjE3NzM5MjAxMTV9.pm6OrxaqD9py-W5nWXurKF7fvLKF87J2Gv1xpHM-LPQ";

// Ensure container fills screen before Cesium init
const cesiumContainer = document.getElementById("cesium-container");
cesiumContainer.style.width = window.innerWidth + "px";
cesiumContainer.style.height = window.innerHeight + "px";

const viewer = new Cesium.Viewer("cesium-container", {
  baseLayerPicker: false,
  animation: false,
  baseLayerPicker: false,
  fullscreenButton: false,
  geocoder: false,
  homeButton: false,
  infoBox: false,
  sceneModePicker: false,
  selectionIndicator: false,
  timeline: false,
  navigationHelpButton: false,
  navigationInstructionInitiallyVisible: false,
  creditContainer: document.createElement("div"),
  skyBox: false,
  skyAtmosphere: false,
  scene3DOnly: true,
  requestRenderMode: false,
});

// Scene settings
const scene = viewer.scene;
const globe = scene.globe;

globe.enableLighting = false;
globe.showGroundAtmosphere = false;
scene.backgroundColor = Cesium.Color.fromCssColorString("#f0ebe0");

// Remove default imagery and add Bing Maps Aerial
viewer.imageryLayers.removeAll();
Cesium.IonImageryProvider.fromAssetId(2).then(provider => {
  viewer.imageryLayers.addImageryProvider(provider);
  console.log("Bing imagery loaded");
}).catch(err => {
  console.error("Bing imagery failed:", err);
});
scene.moon = undefined;

// Remove stars
try { scene.skyBox = undefined; } catch(e) {}
try { scene.skyAtmosphere = undefined; } catch(e) {}
try { scene.sun = new Cesium.Sun(); scene.sun.show = false; } catch(e) {}

// Background color to match parchment
viewer.scene.backgroundColor = Cesium.Color.fromCssColorString("#f0ebe0");

// Initial camera — whole Earth visible, pulled well back
viewer.camera.setView({
  destination: Cesium.Cartesian3.fromDegrees(10.0, 25.0, 28000000),
  orientation: {
    heading: 0,
    pitch: Cesium.Math.toRadians(-90),
    roll: 0,
  }
});

// Re-apply after a frame to make sure it sticks
setTimeout(() => {
  if (!viewer.trackedEntity) {
    viewer.camera.setView({
      destination: Cesium.Cartesian3.fromDegrees(10.0, 25.0, 28000000),
      orientation: {
        heading: 0,
        pitch: Cesium.Math.toRadians(-90),
        roll: 0,
      }
    });
    viewer.resize();
  }
}, 500);

// ─── ORBIT DRAWING ───────────────────────────────────────────────────────────
function propagateSatellite(tle1, tle2, date) {
  try {
    const satrec = satellite.twoline2satrec(tle1, tle2);
    const posVel = satellite.propagate(satrec, date);
    if (!posVel.position) return null;
    const gmst = satellite.gstime(date);
    const geo = satellite.eciToGeodetic(posVel.position, gmst);
    return {
      lat: satellite.degreesLat(geo.latitude),
      lon: satellite.degreesLong(geo.longitude),
      alt: geo.height * 1000,
    };
  } catch(e) { return null; }
}

// Draw all satellite dots using SampledPositionProperty driven by Cesium clock
const satDots = [];
let selectedOrbitEntity = null;

function buildSampledPosition(sat) {
  const satrec = satellite.twoline2satrec(sat.l1, sat.l2);
  const periodMinutes = 1440 / satrec.no;
  const periodMs = periodMinutes * 60 * 1000;
  const now = new Date();
  const sampledPos = new Cesium.SampledPositionProperty();

  // Sample 3 full orbits centred on now — past and future
  const steps = 180;
  for (let i = -steps; i <= steps; i++) {
    const t = new Date(now.getTime() + (i / steps) * 3 * periodMs);
    const c = getSatCartesian(sat.l1, sat.l2, t);
    if (c) sampledPos.addSample(Cesium.JulianDate.fromDate(t), c);
  }

  sampledPos.setInterpolationOptions({
    interpolationDegree: 5,
    interpolationAlgorithm: Cesium.LagrangePolynomialApproximation,
  });
  return sampledPos;
}

function drawOrbitsAndDots(satellites) {
  // Set Cesium clock to current time
  viewer.clock.currentTime = Cesium.JulianDate.now();
  viewer.clock.clockStep = Cesium.ClockStep.SYSTEM_CLOCK_MULTIPLIER;
  viewer.clock.multiplier = 1;
  viewer.clock.shouldAnimate = true;

  satellites.forEach((sat, idx) => {
    const sampledPos = buildSampledPosition(sat);

    const dotEntity = viewer.entities.add({
      position: sampledPos,
      point: {
        pixelSize: 5,
        color: Cesium.Color.fromCssColorString("rgba(26,22,16,0.9)"),
        outlineColor: Cesium.Color.TRANSPARENT,
        outlineWidth: 0,
        disableDepthTestDistance: Number.POSITIVE_INFINITY,
      },
      properties: {
        satId: sat.id,
        satName: sat.name,
        satDesc: sat.desc,
        satIdx: idx,
      },
    });
    satDots.push({ entity: dotEntity, sat, idx, sampledPos });
  });
}

// Get satellite position as ECEF Cartesian3 directly
function getSatCartesian(tle1, tle2, date) {
  try {
    const satrec = satellite.twoline2satrec(tle1, tle2);
    const posVel = satellite.propagate(satrec, date);
    if (!posVel.position) return null;
    const gmst = satellite.gstime(date);
    // Rotate ECI to ECEF directly
    const cosG = Math.cos(gmst), sinG = Math.sin(gmst);
    const x = posVel.position.x * cosG + posVel.position.y * sinG;
    const y = -posVel.position.x * sinG + posVel.position.y * cosG;
    const z = posVel.position.z;
    // satellite.js gives km, Cesium needs metres
    return new Cesium.Cartesian3(x * 1000, y * 1000, z * 1000);
  } catch(e) { return null; }
}

// Track trail entities
const trailEntities = [];

// Draw trail by adding path property to the satellite's own entity
function drawSelectedOrbit(sat) {
  // Remove previous trail path entities
  while (trailEntities.length > 0) {
    const e = trailEntities.pop();
    // Remove path from entity rather than removing the entity
    if (e && e.path) e.path.show = false;
  }

  const found = satDots.find(d => d.sat.id === sat.id);
  if (!found) return;

  const satrec = satellite.twoline2satrec(sat.l1, sat.l2);
  const periodMinutes = 1440 / satrec.no;
  const trailSeconds = (periodMinutes / 4) * 60; // 90° trail

  // Add path to the existing dot entity
  found.entity.path = new Cesium.PathGraphics({
    resolution: 60,
    leadTime: 0,
    trailTime: trailSeconds,
    width: 1.5,
    material: new Cesium.PolylineGlowMaterialProperty({
      glowPower: 0.05,
      color: new Cesium.Color(0.1, 0.087, 0.063, 0.9),
    }),
  });

  trailEntities.push(found.entity);
}

// ─── REAL-TIME POSITION UPDATE ───────────────────────────────────────────────
// SampledPositionProperty driven by Cesium clock — no manual updates needed
function updateSatPositions() {}

// ─── HOVER DETECTION ─────────────────────────────────────────────────────────
const tooltip = document.getElementById("sat-tooltip");
const tooltipName = document.getElementById("sat-tooltip-name");
let hoveredEntity = null;

const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);

handler.setInputAction((movement) => {
  const pickedObject = scene.pick(movement.endPosition);
  
  if (Cesium.defined(pickedObject) && Cesium.defined(pickedObject.id)) {
    const entity = pickedObject.id;
    const props = entity.properties;
    
    if (props && Cesium.defined(props.satName)) {
      const name = props.satName.getValue();
      tooltipName.textContent = name;
      tooltip.style.left = movement.endPosition.x + "px";
      tooltip.style.top = (movement.endPosition.y - 36) + "px";
      tooltip.style.transform = "translateX(-50%)";
      tooltip.classList.add("visible");
      
      // Enlarge dot on hover
      if (hoveredEntity !== entity) {
        if (hoveredEntity) {
          hoveredEntity.point.pixelSize = 5;
          hoveredEntity.point.color = Cesium.Color.fromCssColorString("rgba(26,22,16,0.9)");
        }
        entity.point.pixelSize = 10;
        entity.point.color = Cesium.Color.fromCssColorString("rgba(26,22,16,1.0)");
        hoveredEntity = entity;
      }
      
      viewer.scene.canvas.style.cursor = "crosshair";
      return;
    }
  }
  
  tooltip.classList.remove("visible");
  if (hoveredEntity) {
    hoveredEntity.point.pixelSize = 5;
    hoveredEntity.point.color = Cesium.Color.fromCssColorString("rgba(26,22,16,0.9)");
    hoveredEntity = null;
  }
  viewer.scene.canvas.style.cursor = "default";
  
}, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

// ─── CLICK HANDLER ───────────────────────────────────────────────────────────
handler.setInputAction((click) => {
  const pickedObject = scene.pick(click.position);
  
  if (Cesium.defined(pickedObject) && Cesium.defined(pickedObject.id)) {
    const entity = pickedObject.id;
    const props = entity.properties;
    
    if (props && Cesium.defined(props.satName)) {
      const satIdx = props.satIdx.getValue();
      const sat = currentSatellites[satIdx];
      
      // Hide daily card
      document.getElementById("daily-card").classList.remove("visible");

      // Draw orbit ring for this satellite
      drawSelectedOrbit(sat);

      // Fly to satellite
      flyToSatellite(sat);
      return;
    }
  }
}, Cesium.ScreenSpaceEventType.LEFT_CLICK);

// ─── FLY TO SATELLITE ────────────────────────────────────────────────────────
function flyToSatellite(sat) {
  const found = satDots.find(d => d.sat.id === sat.id);
  if (!found) return;

  autoRotate = false;

  // Clear any existing tracked entity first
  viewer.trackedEntity = undefined;

  const pos = propagateSatellite(sat.l1, sat.l2, new Date());
  if (!pos) return;

  const cameraHeight = pos.alt + 1500000;

  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(pos.lon, pos.lat, cameraHeight),
    orientation: {
      heading: Cesium.Math.toRadians(0),
      pitch: Cesium.Math.toRadians(-90),
      roll: 0,
    },
    duration: 2.5,
    easingFunction: Cesium.EasingFunction.CUBIC_IN_OUT,
    complete: () => {
      // Lock camera to entity — Earth rolls underneath
      viewer.trackedEntity = found.entity;
      // Set camera to look straight down from above the satellite
      viewer.scene.camera.lookAtTransform(
        Cesium.Matrix4.IDENTITY,
        new Cesium.Cartesian3(0, 0, 1500000)
      );
    }
  });
}

// ─── GLOBE AUTO-ROTATE ────────────────────────────────────────────────────────
let autoRotate = true;
let lastTime = Date.now();

scene.postRender.addEventListener(() => {
  // Don't auto-rotate if tracking a satellite — trackedEntity handles camera
  if (!autoRotate || viewer.trackedEntity) return;
  const now = Date.now();
  const delta = (now - lastTime) / 1000;
  lastTime = now;
  viewer.camera.rotate(Cesium.Cartesian3.UNIT_Z, -0.015 * delta);
});

// Stop auto-rotate on user interaction, resume on globe view
viewer.scene.canvas.addEventListener("mousedown", () => {
  if (!viewer.trackedEntity) autoRotate = false;
});
viewer.scene.canvas.addEventListener("touchstart", () => {
  if (!viewer.trackedEntity) autoRotate = false;
});

// ─── DAILY CARD ───────────────────────────────────────────────────────────────
let currentSatellites = [];

function initDailyCard(satellites) {
  const { satellite: daily, issueNum } = getDailySatellite(satellites);
  
  document.getElementById("daily-card-issue").textContent = `Issue No. ${issueNum} — Daily Satellite`;
  document.getElementById("daily-card-name").textContent = daily.name;
  document.getElementById("daily-card-desc").textContent = daily.desc;
  
  document.getElementById("daily-card").addEventListener("click", () => {
    document.getElementById("daily-card").classList.remove("visible");
    drawSelectedOrbit(daily);
    flyToSatellite(daily);
  });
  
  // Show card after 3.5s breath
  setTimeout(() => {
    document.getElementById("daily-card").classList.add("visible");
  }, 3500);
}

// ─── BOOT SEQUENCE ────────────────────────────────────────────────────────────
const season = getCurrentSeason();
document.getElementById("season-indicator").textContent = `${season.name} — ${season.theme}`;
document.getElementById("season-label").textContent = season.theme;

updateClock();
setInterval(updateClock, 1000);

viewer.resize();
viewer.scene.requestRender();

document.getElementById("masthead").classList.add("visible");
document.getElementById("season-indicator").classList.add("visible");

// Fetch live TLEs then boot
(async () => {
  const seasonCatalogue = SATELLITE_CATALOGUE.filter(
    s => s.season === season.key || s.season === "all"
  );

  document.getElementById("sat-count").textContent = `Fetching orbital data…`;
  SATELLITES = await fetchLiveTLEs(seasonCatalogue);
  document.getElementById("sat-count").textContent = `${SATELLITES.length} objects tracked`;
  document.getElementById("sat-count").classList.add("visible");

  currentSatellites = SATELLITES;
  drawOrbitsAndDots(currentSatellites);
  setInterval(updateSatPositions, 15000);

  setTimeout(() => initDailyCard(currentSatellites), 3500);
})();

</script>
